name: SonarQube Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint and convert to SonarQube format
        continue-on-error: true
        run: |
          # Generar raw ESLint output
          npx eslint . --format json --output-file eslint-raw.json --ext .js,.jsx,.ts,.tsx 2>/dev/null || true
          
          # Convertir a formato SonarQube
          if [ -f eslint-raw.json ] && [ -s eslint-raw.json ]; then
            node -e '
            const fs = require("fs");
            try {
              const eslintRaw = JSON.parse(fs.readFileSync("eslint-raw.json", "utf8"));
              const sonarIssues = [];
              
              eslintRaw.forEach(file => {
                if (!file.messages || file.messages.length === 0) return;
                
                const filePath = file.filePath;
                
                file.messages.forEach(msg => {
                  if (msg.severity === 1 || msg.severity === 2) {
                    sonarIssues.push({
                      engineId: "eslint",
                      ruleId: msg.ruleId || "eslint-rule",
                      severity: msg.severity === 2 ? "MAJOR" : "MINOR",
                      type: "CODE_SMELL",
                      primaryLocation: {
                        filePath: filePath,
                        textRange: {
                          startLine: msg.line || 1,
                          startColumn: msg.column || 1,
                          endLine: msg.endLine || msg.line || 1,
                          endColumn: msg.endColumn || msg.column || 1
                        },
                        message: msg.message
                      }
                    });
                  }
                });
              });
              
              const sonarReport = { issues: sonarIssues };
              fs.writeFileSync("eslint-report.json", JSON.stringify(sonarReport, null, 2));
              console.log(`✅ Converted ${sonarIssues.length} ESLint issues`);
            } catch (error) {
              console.log("Error converting ESLint report:", error.message);
              fs.writeFileSync("eslint-report.json", JSON.stringify({ issues: [] }, null, 2));
            }
            '
          else
            echo '{"issues":[]}' > eslint-report.json
            echo "No ESLint issues found, created empty report"
          fi

      - name: Convert custom vulnerabilities to SARIF
        run: |
          if [ -f sonarqube-vulnerabilities.json ]; then
            node -e '
            const fs = require("fs");
            
            try {
              const vulnData = JSON.parse(fs.readFileSync("sonarqube-vulnerabilities.json", "utf8"));
              
              if (!vulnData.vulnerabilities || vulnData.vulnerabilities.length === 0) {
                console.log("⚠️ No vulnerabilities found");
                fs.writeFileSync("security-report.sarif", JSON.stringify({version:"2.1.0",runs:[]}, null, 2));
                process.exit(0);
              }
              
              const sarif = {
                version: "2.1.0",
                runs: [{
                  tool: {
                    driver: {
                      name: "Custom Security Scanner",
                      rules: vulnData.vulnerabilities.map(v => ({
                        id: v.id,
                        shortDescription: { text: v.type },
                        fullDescription: { text: v.description },
                        properties: { cwe: v.cwe }
                      }))
                    }
                  },
                  results: vulnData.vulnerabilities.map(v => ({
                    ruleId: v.id,
                    level: v.severity === "CRITICAL" ? "error" : (v.severity === "HIGH" ? "error" : "warning"),
                    message: { text: `${v.description}\nCWE: ${v.cwe}\nRemediation: ${v.remediation}` },
                    locations: [{
                      physicalLocation: {
                        artifactLocation: { uri: v.file },
                        region: { startLine: v.line }
                      }
                    }]
                  }))
                }]
              };
              
              fs.writeFileSync("security-report.sarif", JSON.stringify(sarif, null, 2));
              console.log(`✅ SARIF report created with ${vulnData.vulnerabilities.length} vulnerabilities`);
            } catch (error) {
              console.error("Error:", error.message);
              fs.writeFileSync("security-report.sarif", JSON.stringify({version:"2.1.0",runs:[]}, null, 2));
            }
            '
          else
            echo '{"version":"2.1.0","runs":[]}' > security-report.sarif
            echo "No vulnerabilities file found"
          fi

      - name: Debug - Verify report files
        run: |
          echo "=== ESLint Report ==="
          head -c 300 eslint-report.json
          echo -e "\n=== SARIF Report ==="
          head -c 300 security-report.sarif
          echo -e "\n=== Validating formats ==="
          if grep -q '^{' eslint-report.json; then
            echo "✅ eslint-report.json starts with {"
          else
            echo "❌ eslint-report.json format error"
            cat eslint-report.json
          fi

      - name: Run security checks
        continue-on-error: true
        run: |
          npm run analyze-vuln || true
          npm run security || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.externalIssuesReportPaths=eslint-report.json,security-report.sarif